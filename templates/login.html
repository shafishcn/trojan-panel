<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Trojan Port Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <main class="login-shell">
    <section class="panel login-panel">
      <h1>Trojan 管理端登录</h1>
      <p>请输入账号与密码</p>

      {% if error %}
        <p class="login-error">{{ error }}</p>
      {% endif %}

      <form method="post" class="login-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>
          <span>账号</span>
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label>
          <span>密码</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit">登录</button>
      </form>
    </section>
  </main>
</body>
</html>
