<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Manager</title>
  <meta name="theme-color" content="#1d587a">
  <link rel="icon" type="image/svg+xml" href="{{ asset_url('app-icon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ asset_url('style.css') }}">
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <main class="container">
    <header class="topbar">
      <div class="topbar-main">
        <h1>
          <span class="brand-title">
            <img class="brand-icon" src="{{ asset_url('app-icon.svg') }}" alt="" width="48" height="48" aria-hidden="true">
            <span class="brand-title-text">订阅管理</span>
          </span>
        </h1>
        <div class="top-links">
          <a class="top-link" href="{{ url_for('index') }}">返回操作页</a>
          <a class="top-link" href="{{ url_for('servers_page') }}">服务器管理</a>
          {% if auth_enabled %}
            <a class="top-link" href="{{ url_for('logout') }}">退出登录{% if current_user %}（{{ current_user }}）{% endif %}</a>
          {% endif %}
        </div>
      </div>
      <p>统一查看、复制和删除已保存的订阅</p>
      <small>配置文件: {{ config_path }}</small>
    </header>

    {% if error %}
      <section class="panel panel-error">
        <h2>配置读取失败</h2>
        <p>{{ error }}</p>
      </section>
    {% endif %}

    <section class="panel sub-panel">
      <div class="config-head">
        <div>
          <h2>已保存订阅</h2>
          <p>可查看生效状态、终止时间，复制有效订阅链接，或跳转回操作页进行覆盖更新。</p>
        </div>
        <div class="config-actions">
          <button id="sub-manager-refresh-btn" class="ghost-btn" type="button">刷新列表</button>
        </div>
      </div>

      <div id="sub-manager-token-list" class="sub-token-list">
        <p class="sub-token-empty">正在加载订阅列表...</p>
      </div>
      <pre id="sub-manager-result" class="result">等待操作...</pre>
    </section>
  </main>

  <script src="{{ asset_url('app.js') }}"></script>
</body>
</html>
